<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jornada ELA — Estrutura. Linguagem. Autoridade.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">

  <style>

    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      /* Cores */
      --gold:        #C49A3C;
      --gold-light:  #D4AF5A;
      --gold-dim:    rgba(196, 154, 60, 0.12);
      --gold-border: rgba(196, 154, 60, 0.25);

      --bg:          #0f0f0f;
      --bg-alt:      #131313;
      --bg-card:     #161616;

      --white:       #FFFFFF;
      --gray-50:     #F5F2ED;
      --gray-200:    #D4CFC8;
      --gray-400:    #9A958E;
      --gray-600:    #5A5650;
      --gray-800:    #2A2825;

      /* Tipografia */
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;

      /* Espaçamento de seção */
      --section-v: 100px;

      /* Container */
      --container: 1100px;
      --gutter:    24px;
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--gray-200);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul, ol {
      list-style: none;
    }

    /* ============================================================
       UTILITÁRIOS GLOBAIS
    ============================================================ */

    /* Container central */
    .container {
      max-width: var(--container);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* Linha dourada separadora */
    .divider {
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold) 60%, transparent 100%);
      opacity: 0.35;
    }

    /* Linha curta decorativa */
    .divider--short {
      width: 56px;
      height: 1px;
      background: var(--gold);
      display: block;
      opacity: 0.7;
    }

    /* Rótulo de seção */
    .section-label {
      display: block;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    /* Título principal de seção */
    .section-title {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 600;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
    }

    /* Subtítulo de seção */
    .section-body {
      font-size: 17px;
      line-height: 1.8;
      color: var(--gray-400);
    }

    /* Botão CTA principal */
    .btn-cta {
      display: inline-block;
      background: var(--gold);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 40px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      white-space: nowrap;
    }

    .btn-cta:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .btn-cta:active {
      transform: translateY(0);
    }

    /* Badge de escassez */
    .scarcity-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--gold-border);
      background: var(--gold-dim);
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .scarcity-badge__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }


    /* ============================================================
       1. HERO
    ============================================================ */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-block: 96px 120px;
      overflow: hidden;
      background: var(--bg);
    }

    /* Brilho radial sutil ao fundo */
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 65% 45%, rgba(196,154,60,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero__wordmark   { /* nome do evento em letras espaçadas */ }
    .hero__headline   { /* título/tagline principal, display size */ }
    .hero__sub        { /* frase de impacto secundária */ }
    .hero__meta       { /* data · local · vagas */ }
    .hero__cta        { /* botão principal */ }
    .hero__scroll     { /* indicador de scroll animado */ }


    /* ============================================================
       2. O PROBLEMA
    ============================================================ */
    #problema {
      padding-block: var(--section-v);
      background: var(--bg-alt);
    }

    .problema__grid   { /* texto à esq, lista à dir */ }
    .problema__text   { /* parágrafos do problema */ }
    .problema__list   { /* itens da lacuna */ }
    .problema__item   { /* cada item com traço dourado */ }


    /* ============================================================
       3. O QUE É
    ============================================================ */
    #oque-e {
      padding-block: var(--section-v);
      background: var(--bg);
      text-align: center;
    }

    .oque-e__body       { /* parágrafos centrados */ }
    .oque-e__numbers    { /* row de números de impacto */ }
    .oque-e__stat       { /* cada card de número */ }


    /* ============================================================
       4. MÉTODO ELA
    ============================================================ */
    #metodo {
      padding-block: var(--section-v);
      background: var(--bg-alt);
    }

    .metodo__header   { /* título centrado */ }
    .metodo__grid     { /* 3 colunas: E · L · A */ }
    .metodo__card     { /* card de cada bloco */ }
    .metodo__letter   { /* letra gigante decorativa */ }
    .metodo__tag      { /* rótulo "Bloco 01" */ }
    .metodo__name     { /* nome do bloco */ }
    .metodo__desc     { /* descrição curta */ }
    .metodo__result   { /* "Resultado esperado:" */ }


    /* ============================================================
       5. PROGRAMAÇÃO
    ============================================================ */
    #programacao {
      padding-block: var(--section-v);
      background: var(--bg);
    }

    .programacao__header  { /* título centrado */ }
    .cronograma           { /* lista vertical com linha-guia */ }
    .cronograma__item     { /* cada bloco: hora · dot · conteúdo */ }
    .cronograma__hora     { /* horário em dourado */ }
    .cronograma__dot      { /* círculo na linha do tempo */ }
    .cronograma__content  { /* bloco · título · palestrante */ }


    /* ============================================================
       6. PALESTRANTES
    ============================================================ */
    #palestrantes {
      padding-block: var(--section-v);
      background: var(--bg-alt);
    }

    .palestrantes__header { /* título centrado */ }
    .palestrantes__grid   { /* 3 colunas */ }
    .palestrante__card    { /* card por pessoa */ }
    .palestrante__photo   { /* área da foto / placeholder */ }
    .palestrante__info    { /* bloco · nome · cargo · bio */ }


    /* ============================================================
       7. INCLUI
    ============================================================ */
    #inclui {
      padding-block: var(--section-v);
      background: var(--bg);
      text-align: center;
    }

    .inclui__grid   { /* 3 itens em linha */ }
    .inclui__item   { /* cada item: ícone · título · desc */ }
    .inclui__icon   { /* caixinha com SVG dourado */ }


    /* ============================================================
       8. INVESTIMENTO
    ============================================================ */
    #investimento {
      padding-block: var(--section-v);
      background: var(--bg-alt);
      text-align: center;
      position: relative;
    }

    #investimento::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(196,154,60,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .investimento__price   { /* valor em display grande */ }
    .investimento__parcela { /* texto de parcelamento */ }
    .investimento__cta     { /* botão + nota de local/data */ }


    /* ============================================================
       9. PATROCINADORES
    ============================================================ */
    #patrocinadores {
      padding-block: 56px;
      background: var(--bg);
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .patrocinadores__label { /* rótulo "Realização e apoio" */ }
    .patrocinadores__list  { /* logos/nomes em linha */ }
    .patrocinador__item    { /* cada nome/logo */ }


    /* ============================================================
       10. RODAPÉ
    ============================================================ */
    footer {
      padding-block: 44px;
      background: #080808;
      border-top: 1px solid var(--gold-border);
    }

    .footer__inner   { /* flex: brand · contato · social */ }
    .footer__brand   { /* wordmark */ }
    .footer__contact { /* whatsapp link */ }
    .footer__social  { /* links de redes */ }
    .footer__copy    { /* linha de copyright */ }


    /* ============================================================
       STICKY CTA — MOBILE
    ============================================================ */
    #sticky-cta {
      display: none; /* ativado via JS em mobile */
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--bg);
      border-top: 1px solid var(--gold-border);
      padding: 12px var(--gutter);
    }

    .sticky-cta__inner { /* flex: preço à esq, botão à dir */ }
    .sticky-cta__label { /* "Jornada ELA · 23 mai" */ }
    .sticky-cta__price { /* valor compacto */ }


    /* ============================================================
       RESPONSIVO — BREAKPOINTS
    ============================================================ */
    @media (max-width: 900px) {
      :root { --section-v: 80px; }

      /* grids de 3 col viram 1 col */
      .metodo__grid,
      .palestrantes__grid,
      .inclui__grid {
        /* será definido quando o conteúdo existir */
      }
    }

    @media (max-width: 600px) {
      :root {
        --section-v: 64px;
        --gutter: 20px;
      }

      /* sticky CTA visível apenas em mobile */
      #sticky-cta {
        display: block;
      }

      body {
        padding-bottom: 76px; /* evita que conteúdo fique atrás do sticky */
      }
    }

  </style>
</head>
<body>

  <!-- ============================================================
       1. HERO
  ============================================================ -->
  <section id="hero">
    <div class="container">
      <!-- conteúdo será preenchido na próxima etapa -->
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       2. O PROBLEMA
  ============================================================ -->
  <section id="problema">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       3. O QUE É A JORNADA ELA
  ============================================================ -->
  <section id="oque-e">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       4. O MÉTODO ELA
  ============================================================ -->
  <section id="metodo">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       5. PROGRAMAÇÃO
  ============================================================ -->
  <section id="programacao">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       6. QUEM APRESENTA
  ============================================================ -->
  <section id="palestrantes">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       7. INCLUI
  ============================================================ -->
  <section id="inclui">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       8. INVESTIMENTO + CHECKOUT
  ============================================================ -->
  <section id="investimento">
    <div class="container">
    </div>
  </section>

  <span class="divider" role="presentation"></span>

  <!-- ============================================================
       9. PATROCINADORES
  ============================================================ -->
  <section id="patrocinadores">
    <div class="container">
    </div>
  </section>

  <!-- ============================================================
       10. RODAPÉ
  ============================================================ -->
  <footer>
    <div class="container">
      <div class="footer__inner">
      </div>
    </div>
  </footer>

  <!-- ============================================================
       STICKY CTA (mobile)
  ============================================================ -->
  <div id="sticky-cta" aria-label="Chamada para ação fixada">
    <div class="sticky-cta__inner">
    </div>
  </div>

  <!-- JS será adicionado em etapa posterior -->

</body>
</html>
